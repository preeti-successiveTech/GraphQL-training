type Query {
  messages: [Message!]!
  getUsers: [User!]!
  getUserById(id: ID!): UserResult!
  getPosts(page: Int!, limit: Int!, sortOrder: sortOrder): [Post!]!
  getPostById(id: ID!): Post
  getPostsByUserId(userId: ID!): [Post!]!
  getComments: [Comment!]!
  getCommentsByPostId(postId: ID!): [Comment!]!
  getUserByComment(comment: CommentInput!): User
  getAuthorOfPost(post: PostInput!): User
  usersChat: [UserChat!]!
  messagesChat(limit: Int): [MessageChat!]!
  allUsers: [UserChat]!
}

type Mutation {
  postMessage(content: String!, author: String!, title: String!): Message!
  createPost(title: String!, content: String!, authorId: ID!): Post!
  updateUser(id: ID!, name: String!): User
  addComment(text: String!, postId: ID!, userId: ID!): Comment
  deleteComment(id: ID!): Boolean
  register(name: String!, password: String!,role:String!, email: String!): UserChat!
  login(name: String!, password: String!): AuthPayload!
  logout: Boolean!
  sendMessage(content: String!): MessageChat!
  deleteUser(userId: ID!): UserChat!
}
type Subscription {
  postMessage: Message!
  addComment: Comment!
  UserJoined: UserJoinedPayload!
  UserLogout: UserLogoutPayload!
}
type UserJoinedPayload {
  userMessage: String!
}
type UserLogoutPayload {
  userMessage: String!
}

type AuthPayload {
  user: UserChat!
  token: String!
}
input CommentInput {
  id: ID!
  text: String!
  postId: ID!
  userId: ID!
}

input PostInput {
  id: ID!
  title: String!
  content: String!
  authorId: ID!
}
