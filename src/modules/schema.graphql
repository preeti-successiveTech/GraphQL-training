type Query {
  messages: [Message!]!
  //blog
  getUsers: [User!]!
  getUserById(id: ID!): UserResult!
  getPosts(page: Int!, limit: Int!, sortOrder: sortOrder): [Post!]!
  getPostById(id: ID!): Post
  getPostsByUserId(userId: ID!): [Post!]!
  getComments: [Comment!]!
  getCommentsByPostId(postId: ID!): [Comment!]!
  getUserByComment(comment: CommentInput!): User
  getAuthorOfPost(post: PostInput!): User
  //Chat Application
  users: [User!]!
  messages(limit: Int): [Message!]!
}

type Mutation {
  postMessage(content: String!, author: String!, title: String!): Message!
  //Blog
  createPost(title: String!, content: String!, authorId: ID!): Post!
  updateUser(id: ID!, name: String!): User
  addComment(text: String!, postId: ID!, userId: ID!): Comment
  deleteComment(id: ID!): Boolean
  //chat 
   register(name: String!, password: String!): User!
  login(name: String!, password: String!): String!
  logout(userId: ID!): Boolean!
  sendMessage(content: String!, authorId: ID!): Message!

}
type Subscription{
    postMessage: Message!
    addComment: Comment!
}

input CommentInput {
  id: ID!
  text: String!
  postId: ID!
  userId: ID!
}

input PostInput {
  id: ID!
  title: String!
  content: String!
  authorId: ID!
}
